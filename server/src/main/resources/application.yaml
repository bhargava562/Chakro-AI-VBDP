spring:
  application:
    name: chakro-vbdp-server

  # ---- Virtual Threads (Java 21) ----
  threads:
    virtual:
      enabled: true

  # ---- Datasource (PostgreSQL) ----
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000

  # ---- Flyway Migrations ----
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true

  # ---- JPA / Hibernate ----
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ---- Servlet (file upload limits) ----
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# ---- Server ----
server:
  port: ${SERVER_PORT:8080}

# ---- VBDP Configuration ----
vbdp:
  file-storage-path: ${VBDP_FILE_STORAGE:./generated-proposals}
  download-token-expiry-hours: 24

# ---- Actuator & Monitoring ----
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: chakro-vbdp-server

# ---- Logging ----
logging:
  level:
    root: INFO
    com.chakro: DEBUG
    dev.langchain4j: DEBUG
