services:
  postgres:
    image: 'postgres:16-alpine'
    environment:
      - 'POSTGRES_DB=chakro_dev'
      - 'POSTGRES_PASSWORD=devpassword123'
      - 'POSTGRES_USER=chakro_dev'
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
